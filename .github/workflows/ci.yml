name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.13

      - name: Run tests
        run: uv run pytest tests/ -q -m "not integration" --tb=short --cov=agnoclaw --cov-report=term-missing --cov-fail-under=80

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.13

      - name: Run ruff (lint)
        run: uv run ruff check src/ tests/ --select F,B,E9

      - name: Run mypy
        run: uv run mypy src/agnoclaw/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking until we reach full type coverage
