name: Publish to PyPI

# Publishes to PyPI when a version bump lands on main, and tags the release in
# the same run.
#
# Why one workflow: a tag pushed by a workflow's GITHUB_TOKEN does NOT trigger
# other workflows, so the old "auto-tag.yml pushes tag -> publish.yml fires on
# the tag" hand-off silently never published (see v0.8.0). Doing the publish in
# the same run that detects the bump removes the cross-workflow trigger entirely.
# PyPI trusted publishing still matches on the workflow filename (publish.yml) +
# environment (pypi), both preserved here, so no PyPI reconfiguration is needed.
on:
  push:
    branches: [main]
  workflow_dispatch: {}  # allow a manual re-run if a publish needs retrying

permissions:
  id-token: write  # trusted publishing (OIDC)
  contents: write  # create + push the release tag

jobs:
  check:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.v.outputs.publish }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        name: Publish only when v<version> is not yet tagged
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "v$VERSION already tagged — nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$VERSION is new — will test, publish, and tag."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test before publish
    needs: check
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.13

      - name: Run tests
        run: uv run pytest tests/ -q -m "not integration" --tb=short

      - name: Lint
        run: uv run ruff check src/ tests/ --select F,B,E9

  publish:
    name: Build & publish
    needs: [check, test]
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Tag the release
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
